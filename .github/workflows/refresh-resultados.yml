name: Refrescar resultados

# Lanza un despliegue en Vercel periódicamente para refrescar el fichero
# estático de resultados (public/results.json), que actúa como RESPALDO de la
# función en vivo /api/results. Como la frescura la da la función, este cron va
# espaciado (cada 6 h) para gastar menos build minutes.

on:
  schedule:
    # cada 6 horas (UTC). El respaldo no necesita más. https://crontab.guru
    - cron: '0 */6 * * *'
  workflow_dispatch: {} # botón para lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al Deploy Hook de Vercel
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Falta el secreto VERCEL_DEPLOY_HOOK_URL (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          echo "Disparando redeploy en Vercel…"
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP $code"
          cat /tmp/resp.txt || true
          # Vercel responde 201 (o 200) al crear el deployment
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::El Deploy Hook devolvió $code"
            exit 1
          fi
          echo "Redeploy lanzado correctamente."
