name: Refrescar resultados

# Lanza un nuevo despliegue en Vercel periódicamente para que se vuelvan a
# descargar los resultados del Mundial. No cambia el código: solo llama al
# Deploy Hook, que reconstruye la rama de producción (main) y re-ejecuta el
# fetch de la API durante el build.

on:
  schedule:
    # cada 2 horas (UTC). Ajusta a tu gusto: https://crontab.guru
    - cron: '0 */2 * * *'
  workflow_dispatch: {} # botón para lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al Deploy Hook de Vercel
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Falta el secreto VERCEL_DEPLOY_HOOK_URL (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          echo "Disparando redeploy en Vercel…"
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP $code"
          cat /tmp/resp.txt || true
          # Vercel responde 201 (o 200) al crear el deployment
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::El Deploy Hook devolvió $code"
            exit 1
          fi
          echo "Redeploy lanzado correctamente."
